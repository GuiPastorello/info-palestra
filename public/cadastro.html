<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="./css/logincadastro.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="icon" href="assets/imgs/fav_icon.png">
  <script src="./js/sessao.js"></script>
  <script src="./js/user.js"></script>
</head>

<body>
  <main>

    <div class="imagem">
      <img src="./assets/imgs/Logo_infopalestra.svg">
    </div>

    <div class="login">
      <a href="index.html" class="retorno"> <span>
         <   </span> </a>
      <div class="login_bloco">

        <div class="alerta_erro">
          <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
          </div>
        </div>

        <form>
          <h1>Cadastro</h1>
          <label for="nome_input">Nome de usuario:</label>
          <input id="nome_input" type="text" placeholder="Seu nome" />
          <label for="email_input">Email:</label>
          <input type="text" id="email_input" name="email" required placeholder="meuemail@provedor.com">
          <label for="senha_input">Senha:</label>
          <input type="password" id="senha_input" name="password" required placeholder="******">
          <label for="confirmacao_senha_input">Confirmação da Senha:</label>
          <input id="confirmacao_senha_input" type="password" placeholder="******" />

          <div id="div_erros_login"></div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
          <div id="div_aguardar" class="loading-div">
            <img src="./assets/loading.gif" id="loading-gif">
          </div>

        </form>



      </div>
    </div>
  </main>
</body>

</html>
<script>

  document.querySelector('form').addEventListener('submit', function (event) {
    event.preventDefault(); // Impede o envio padrão/recarregamento
    console.log('Formulário submetido sem recarregar!');
    // Aqui você chama sua função AJAX ou processamento
  });

  function cadastrar() {

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }


  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
