<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash | InfoPalestra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

    <link rel="icon" href="assets/imgs/fav_icon.png">
    <link rel="stylesheet" href=".\css\style.css">
    <script src="./js/sessao.js"></script>
    <script src="./js/user.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="body_dash" onload="onloadDash(), obterDadosGrafico(), ObterLeaderboard(), buscarMelhorTentativa()">
    <!-- PERFIL DA DASHBOARD -->
    <header class="header_dash">

        <div class="dash_profile">

            <div>
                <img src="assets/imgs/Logo_infopalestra.svg" alt="">
            </div>

            <div class="dash_profile_items">
                <h3><span id="b_usuario">Usuario</span></h3>
                <p><span id="b_email">email@email.com</span></p>
            </div>

        </div>

        <hr>

        <!-- ITEMS DA HEADER DA DASHBOARD -->
        <div class="items_header">
            <div class="item_header">
                <a href="index.html"><img src="assets/imgs/home_icon.svg">Pagina Inicial</a>
            </div>

            <div class="item_header">
                <a href="quiz.html"><img src="assets/imgs/quiz_icon.svg">Quiz</a>
            </div>

            <div class="item_header">

                <a onclick="limparSessao()"><img src="assets/imgs/sair_icon.svg">Sair</a>
            </div>
        </div>

    </header>


    <!-- DASH -->
    <div class="div_dash">

        <div class="indicadores">
            <div class="indicador melhor_tempo">
                <img src="assets/imgs/melhor_tempo.svg">
                <div>
                    <h3>MELHOR TEMPO:</h3>
                    <p> 03:03:32 min</p>
                </div>
            </div>
            <div class="indicador melhor_tempo">
                <img src="assets/imgs/melhor_tentativa.svg">
                <div>
                    <h3>MELHOR TENTATIVA:</h3>
                    <p> <span id="melhor_tentativa_id">?</span>/30 Questões</p>
                </div>
            </div>
        </div>

        <div class="graficos">
            <div class="grafico leader">
                <div class="titulo_leader">
                    <h2>LEADERBOARD</h2>
                </div>
                <div class="ranking_leader" id="leaderboard_id">
                    <p class="podio">|🥇 -</p>
                    <p class="podio">|🥈 -</p>
                    <p class="podio">|🥉 -</p>
                    <p>| 4 -</p>
                    <p>| 5 -</p>
                    <p>| 6 -</p>
                    <p>| 7 -</p>
                    <p>| 8 -</p>
                    <p>| 9 -</p>
                    <p>| 10 -</p>
                </div>
            </div>
            <div class="grafico">
                <div class="titulo_leader2">
                    <h2>Desempenho Geral dos Usuários</h2>
                </div>
                <div class="canva">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>
    </div>


</body>

</html>
<script>
    function buscarMelhorTentativa() {
        console.log('Buscandom melhor tentativa com ACERTOS...')

        var fk_usuario = sessionStorage.ID_USUARIO;

        // Verificando se há usuario logado
        if (!fk_usuario || fk_usuario == "") {
            console.log("Erro: Usuário não está logado!");
            alert("Erro: Usuário não está logado!");
            return false;
        }

        // Enviando o req necessaria com acertos
        fetch(`/quiz/melhor-tentativa/${fk_usuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
            }
        })
            .then(function (resposta) {
                // console.log("resposta atualizar: ", resposta);

                if (resposta.ok) {
                    resposta.json().then(function (resposta) {
                    console.log("busca por melhor tentativa com exito");
                    // alert("Tentativa concluída e salva com sucesso!");
                    // console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    console.log(resposta)
                    plotarMelhorTehtativa(resposta)
                });
               
                } else {
                    throw "Houve um erro ao tentar buscar a tentativa!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO ao atualizar: ${resposta}`);
                alert("Erro ao buscar tentativa: " + resposta);
            });

            
    }
    function plotarMelhorTehtativa(resposta){
        let melhorTentativa = resposta[0].acertos;

        melhor_tentativa_id.innerHTML = melhorTentativa;
    }


    function ObterLeaderboard() {

        fetch(`/quiz/leaderboard`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    // console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    // resposta.reverse();
                    // console.log(`Cheguei ${resposta}`)
                    plotarLeaderboard(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }
    function plotarLeaderboard(resposta) {
        const leaderboard = resposta;

        let html = `
                    <p class="podio">|🥇 - ${leaderboard[0].nome} - Acertou ${leaderboard[0].acertos} questões - ${leaderboard[0].tempoGasto} segundos</p>
                    <p class="podio">|🥈 - ${leaderboard[1].nome} - Acertou ${leaderboard[1].acertos} questões - ${leaderboard[1].tempoGasto} segundos</p>
                    <p class="podio">|🥉 - ${leaderboard[2].nome} - Acertou ${leaderboard[2].acertos} questões - ${leaderboard[2].tempoGasto} segundos</p>
                    <p>| 4 - ${leaderboard[3].nome} - Acertou ${leaderboard[3].acertos} questões - ${leaderboard[3].tempoGasto} segundos</p>
                    <p>| 5 - ${leaderboard[4].nome} - Acertou ${leaderboard[4].acertos} questões - ${leaderboard[4].tempoGasto} segundos</p>
                    <p>| 6 - ${leaderboard[5].nome} - Acertou ${leaderboard[5].acertos} questões - ${leaderboard[5].tempoGasto} segundos</p>
                    <p>| 7 - ${leaderboard[6].nome} - Acertou ${leaderboard[6].acertos} questões - ${leaderboard[6].tempoGasto} segundos</p>
                    <p>| 8 - ${leaderboard[7].nome} - Acertou ${leaderboard[7].acertos} questões - ${leaderboard[7].tempoGasto} segundos</p>
                    <p>| 9 - ${leaderboard[8].nome} - Acertou ${leaderboard[8].acertos} questões - ${leaderboard[8].tempoGasto} segundos</p>
                    <p>| 10 -${leaderboard[9].nome} - Acertou ${leaderboard[9].acertos} questões - ${leaderboard[9].tempoGasto} segundos</p>
                </div>
        `
        leaderboard_id.innerHTML = html

    }

    function obterDadosGrafico() {

        fetch(`/quiz/desempenho-geral`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    // console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    // resposta.reverse();
                    // console.log(`Cheguei ${resposta}`)
                    plotarGrafico(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico(resposta) {
        const zeroAquatro = resposta[0].zeroAquatro;
        const cincoAnove = resposta[0].cincoAnove;
        const dezAquinze = resposta[0].dezAquinze;

        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['0 a 4 Acertos', '5 a 9 Acertos', '10 a 15 Acertos'],
                datasets: [{
                    label: 'Quantidade de acertos',
                    data: [zeroAquatro, cincoAnove, dezAquinze],
                    borderWidth: 2,
                    backgroundColor: '#095c36'
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }
</script>
